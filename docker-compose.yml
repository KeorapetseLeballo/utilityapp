services:
  db:
    image: postgres:16
    container_name: utilities-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: utilities
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d utilities"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
